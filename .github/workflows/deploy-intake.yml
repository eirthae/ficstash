name: Deploy Intake

# Creates the public `intake` Storage bucket (if missing) and uploads
# intake/index.html to it, using the server-side service-role key (never
# exposed). Runs on demand, and whenever the tool changes on main.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['intake/index.html']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create bucket + upload the tool
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SR: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -uo pipefail
          base="${SUPABASE_URL%/}"

          echo "== ensure public bucket 'intake' =="
          curl -sS -X POST "$base/storage/v1/bucket" \
            -H "Authorization: Bearer $SR" -H "apikey: $SR" \
            -H "Content-Type: application/json" \
            -d '{"id":"intake","name":"intake","public":true}' ; echo
          # (a 400 "already exists" here is fine — we just want it to exist.)

          echo "== make sure it's public =="
          curl -sS -X PUT "$base/storage/v1/bucket/intake" \
            -H "Authorization: Bearer $SR" -H "apikey: $SR" \
            -H "Content-Type: application/json" \
            -d '{"public":true}' ; echo

          echo "== upload index.html (upsert) =="
          code=$(curl -sS -o /tmp/up.json -w '%{http_code}' -X POST \
            "$base/storage/v1/object/intake/index.html" \
            -H "Authorization: Bearer $SR" -H "apikey: $SR" \
            -H "Content-Type: text/html; charset=utf-8" \
            -H "cache-control: 300" -H "x-upsert: true" \
            --data-binary @intake/index.html)
          echo "HTTP $code"; cat /tmp/up.json; echo
          [ "$code" = "200" ] || { echo "Upload failed"; exit 1; }

          echo ""
          echo "Done. Open this on any device:"
          echo "  $base/storage/v1/object/public/intake/index.html"
