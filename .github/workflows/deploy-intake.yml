name: Deploy Intake

# Creates the public `intake` Storage bucket (if missing) and uploads
# intake/index.html to it as text/html, using the supabase-js client with the
# server-side service-role key (never exposed). The raw REST upload doesn't set
# the mimetype reliably (Supabase stored it as text/plain, so browsers showed
# source) — the client's contentType option does. Runs on demand and on changes.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['intake/index.html']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Install supabase-js
        run: npm init -y >/dev/null 2>&1 && npm i @supabase/supabase-js@2 >/dev/null 2>&1

      - name: Create bucket + upload as text/html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SR: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node <<'JS'
          const fs = require('fs');
          const { createClient } = require('@supabase/supabase-js');
          const sb = createClient(process.env.SUPABASE_URL, process.env.SR, { auth: { persistSession: false } });
          (async () => {
            // ensure a public bucket
            const { error: be } = await sb.storage.createBucket('intake', { public: true });
            if (be && !/exist/i.test(be.message)) { console.error('createBucket:', be.message); }
            await sb.storage.updateBucket('intake', { public: true }).catch(() => {});
            // Remove the existing object FIRST: upsert keeps the old object's
            // mimetype (it was stuck as text/plain). A fresh upload with the
            // contentType option then sets text/html so the page renders.
            await sb.storage.from('intake').remove(['index.html']).catch(() => {});
            const body = fs.readFileSync('intake/index.html');
            const { error } = await sb.storage.from('intake').upload('index.html', body, {
              contentType: 'text/html; charset=utf-8', upsert: true, cacheControl: '60',
            });
            if (error) { console.error('upload failed:', error.message); process.exit(1); }
            console.log('Uploaded intake/index.html as text/html.');
            console.log('URL: ' + process.env.SUPABASE_URL + '/storage/v1/object/public/intake/index.html');
          })();
          JS
          echo "== verify served content-type =="
          curl -sSI "${SUPABASE_URL%/}/storage/v1/object/public/intake/index.html" | grep -i "content-type" || true
