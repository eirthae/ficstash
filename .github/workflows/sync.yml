name: Sync

# Runs the FicStash worker: downloads requested links/saves, repairs metadata,
# discovers tracked-tag matches from AO3's PUBLIC pages, and backfills offline
# copies — all logged-out, no account import. Runs on a schedule and on demand.
# All credentials come from repo secrets and are passed by name — never printed.
on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Re-check ALL works (status, new chapters, AO3 series), not just ongoing ones"
        type: boolean
        default: false
      saves_only:
        description: "Fast path: fetch only requested links + saves, then stop (real-time Save)"
        type: boolean
        default: false
      reseed_tags:
        description: "Re-fetch ALL discover tags all-time (refresh metadata e.g. descriptions; keeps saved/seen/dismissed)"
        type: boolean
        default: false
  schedule:
    # Daily at 03:00 Japan time (JST = UTC+9), i.e. 18:00 UTC. Moved earlier from
    # 04:00 to give the (now all-time first-run) tag fetch more overnight headroom.
    # AO3 is a volunteer nonprofit — keep this to once a day.
    - cron: "0 18 * * *"

# Don't let a scheduled run and a manual run hammer AO3 at the same time.
# Saves-only (real-time Save) runs in their OWN lane so they fire immediately
# instead of queuing behind a full sweep.
concurrency:
  group: ${{ (github.event.inputs.saves_only == 'true') && 'ficstash-save' || 'ficstash-sync' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # Safety net: a healthy run finishes in a few minutes (saves-only) to under an
    # hour (a heavy nightly full sweep). Cap it so a run wedged by AO3 throttling /
    # a hung request fails fast instead of hanging up to GitHub's 6-hour default
    # (which showed up as 40–100-minute "failures" and a 59-minute cancel).
    timeout-minutes: 75
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # "Re-check ALL works" toggle on a manual run → full library revamp.
          FULL_REFRESH: ${{ inputs.full_refresh && '1' || '' }}
          SAVES_ONLY: ${{ inputs.saves_only && '1' || '' }}
          # One-shot: re-fetch every discover tag all-time so existing matches get
          # refreshed metadata (e.g. backfilled descriptions). Keeps saved/seen flags.
          RESEED_TAGS: ${{ inputs.reseed_tags && '1' || '' }}
          # How long works/new chapters live in What's New (days). Defaults to 1
          # (24h); change the repo variable WHATS_NEW_DAYS in Settings → Variables
          # to re-tune (e.g. 3 or 5) with no code change. Library keeps everything.
          WHATS_NEW_DAYS: ${{ vars.WHATS_NEW_DAYS || '1' }}
          # Optional AO3 login: when these secrets are set the worker logs in so it
          # can fetch members-only / registered-users-only works (e.g. series works
          # a guest can't get). If unset, it runs logged-out on public pages. The
          # password is passed by name and never printed.
          AO3_USERNAME: ${{ secrets.AO3_USERNAME }}
          AO3_PASSWORD: ${{ secrets.AO3_PASSWORD }}
        run: python main.py
