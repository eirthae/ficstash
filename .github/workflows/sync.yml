name: Sync from AO3

# Logs in to AO3, imports bookmarks, and writes works + chapters into Supabase.
# Runs on a schedule and on demand. All credentials come from repo secrets and
# are passed to the worker by name — never printed.
on:
  workflow_dispatch:
  schedule:
    # Daily at 04:00 Japan time (JST = UTC+9), i.e. 19:00 UTC.
    # AO3 is a volunteer nonprofit — keep this to once a day.
    - cron: "0 19 * * *"

# Don't let a scheduled run and a manual run hammer AO3 at the same time.
concurrency:
  group: ficstash-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AO3_USERNAME: ${{ secrets.AO3_USERNAME }}
          AO3_PASSWORD: ${{ secrets.AO3_PASSWORD }}
          # Optional repo variable: how many history pages to walk per run.
          # Leave unset for the default (3 ≈ 60 works); set to "all" for everything.
          HISTORY_MAX_PAGES: ${{ vars.HISTORY_MAX_PAGES }}
        run: python main.py
