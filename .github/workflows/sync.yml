name: Sync

# Runs the FicStash worker: downloads requested links/saves, repairs metadata,
# discovers tracked-tag matches from AO3's PUBLIC pages, and backfills offline
# copies — all logged-out, no account import. Runs on a schedule and on demand.
# All credentials come from repo secrets and are passed by name — never printed.
on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Re-check ALL works (status, new chapters, AO3 series), not just ongoing ones"
        type: boolean
        default: false
  schedule:
    # Daily at 03:00 Japan time (JST = UTC+9), i.e. 18:00 UTC. Moved earlier from
    # 04:00 to give the (now all-time first-run) tag fetch more overnight headroom.
    # AO3 is a volunteer nonprofit — keep this to once a day.
    - cron: "0 18 * * *"

# Don't let a scheduled run and a manual run hammer AO3 at the same time.
concurrency:
  group: ficstash-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # "Re-check ALL works" toggle on a manual run → full library revamp.
          FULL_REFRESH: ${{ inputs.full_refresh && '1' || '' }}
          # No AO3 login: the worker only reads AO3's public pages now. The
          # AO3_USERNAME/AO3_PASSWORD secrets are no longer used and can be deleted.
        run: python main.py
