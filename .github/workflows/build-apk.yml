name: Build APK

# Manual trigger only — run from the Actions tab, download the APK artifact.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure Supabase env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          ref="$(printf '%s' "$SUPABASE_URL" | sed -E 's#https?://([^.]+)\..*#\1#')"
          # Fetch the publishable anon key via the Management API (reveal=true returns the value).
          anon="$(curl -sS "https://api.supabase.com/v1/projects/$ref/api-keys?reveal=true" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            | jq -r '.[] | select(.name=="anon") | .api_key')"
          if [ -z "$anon" ] || [ "$anon" = "null" ]; then
            echo "Failed to retrieve anon key from Management API"; exit 1
          fi
          # Vite inlines VITE_-prefixed vars from .env.production at build time.
          printf 'VITE_SUPABASE_URL=%s\n' "$SUPABASE_URL" >> .env.production
          printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$anon"     >> .env.production
          echo "Wrote app/.env.production (anon key length: ${#anon})."

      - name: Build web bundle
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync web bundle into Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: app/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ficstash-app-debug
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
