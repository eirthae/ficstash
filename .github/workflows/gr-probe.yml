name: GR probe
on: { workflow_dispatch: {} }
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Curl Goodreads from an Actions IP
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120 Safari/537.36"
          echo "shelf/show/hockey:"
          curl -s -A "$UA" -o /tmp/gr.html -w "  HTTP %{http_code} · %{size_download} bytes · final %{url_effective}\n" "https://www.goodreads.com/shelf/show/hockey"
          echo "  bookTitle links: $(grep -oc 'class=\"bookTitle\"' /tmp/gr.html || true)"
          echo "  cloudflare/blocked markers: $(grep -ioE 'cloudflare|captcha|access denied|attention required' /tmp/gr.html | head -1 || echo none)"
