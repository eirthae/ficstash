name: Spike — Scribble Hub reachability

# Throwaway diagnostic for Phase D: does Scribble Hub serve its public HTML to a
# GitHub Actions (datacenter) IP, or does it hide behind a Cloudflare challenge?
# Manual-only. The job's pass/fail is the answer; delete this workflow and
# worker/spike_scribblehub.py once the build/skip decision is made.
on:
  workflow_dispatch:

jobs:
  spike:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Probe Scribble Hub
        run: python spike_scribblehub.py
