name: Spike — NovelUpdates reachability

# Throwaway diagnostic for Phase E: does NovelUpdates serve its public HTML to a
# GitHub Actions (datacenter) IP, or hide behind a Cloudflare challenge? NU is
# more aggressively gated than Royal Road / Scribble Hub, so we check before
# building. Manual-only. Delete this workflow + worker/spike_novelupdates.py
# once the build/skip decision is made.
on:
  workflow_dispatch:

jobs:
  spike:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cloudscraper
        run: pip install cloudscraper

      - name: Probe NovelUpdates
        run: python spike_novelupdates.py
