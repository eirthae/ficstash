name: DB setup

# Applies SQL migrations to Supabase via the Management API.
# Uses SUPABASE_ACCESS_TOKEN (a personal access token) — no DB password needed.
# Manual trigger only. Migrations are idempotent (create ... if not exists).
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply migrations
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # Project ref is the subdomain of the Supabase URL: https://<ref>.supabase.co
          ref="$(printf '%s' "$SUPABASE_URL" | sed -E 's#https?://([^.]+)\..*#\1#')"
          if [ -z "$ref" ]; then echo "Could not derive project ref from SUPABASE_URL"; exit 1; fi
          echo "Applying migrations to project: $ref"

          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ $f"
            payload="$(jq -Rs '{query: .}' < "$f")"
            http_code="$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -X POST "https://api.supabase.com/v1/projects/$ref/database/query" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              --data "$payload")"
            if [ "$http_code" -ge 300 ]; then
              echo "Migration failed ($http_code):"
              cat /tmp/resp.json
              exit 1
            fi
            echo "  ok ($http_code)"
          done
          echo "All migrations applied."
